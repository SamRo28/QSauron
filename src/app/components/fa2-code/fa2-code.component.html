<div class="page-container">
    <div class="back-button-container">
        <a routerLink="/login" class="glass-btn glass-btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            Go Back
        </a>
    </div>

    <div class="content-wrapper">
        <div class="glass-card verification-card animate-fade-in-up">
            <div class="icon-container mb-20">
                <div class="lock-icon-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
            </div>

            <div class="text-center mb-20">
                <h1 class="title">Two-Step Verification</h1>
                <p class="subtitle">
                    Enter the 6-digit code from your Google Authenticator app
                </p>
            </div>

            <div class="code-inputs mb-20">
                <input type="text" class="glass-input code-digit" maxlength="1" #input1 #digitInput
                    (input)="onInput($event, input1, input2)" (keydown)="onKeyDown($event, null, input1)"
                    autocomplete="off">
                <input type="text" class="glass-input code-digit" maxlength="1" #input2 #digitInput
                    (input)="onInput($event, input2, input3)" (keydown)="onKeyDown($event, input1, input2)"
                    autocomplete="off">
                <input type="text" class="glass-input code-digit" maxlength="1" #input3 #digitInput
                    (input)="onInput($event, input3, input4)" (keydown)="onKeyDown($event, input2, input3)"
                    autocomplete="off">
                <input type="text" class="glass-input code-digit" maxlength="1" #input4 #digitInput
                    (input)="onInput($event, input4, input5)" (keydown)="onKeyDown($event, input3, input4)"
                    autocomplete="off">
                <input type="text" class="glass-input code-digit" maxlength="1" #input5 #digitInput
                    (input)="onInput($event, input5, input6)" (keydown)="onKeyDown($event, input4, input5)"
                    autocomplete="off">
                <input type="text" class="glass-input code-digit" maxlength="1" #input6 #digitInput
                    (input)="onInput($event, input6, null)" (keydown)="onKeyDown($event, input5, input6)"
                    autocomplete="off">
            </div>

            <button class="glass-btn w-full mb-20" (click)="verifyCode()">
                Verify Code
            </button>
        </div>
    </div>
</div>
