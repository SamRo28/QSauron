<div class="recovery-container">
  <div class="recovery-card">
    <div class="recovery-header">
      <div class="logo-container">
        <img src="assets/logo.svg" alt="QSauron Logo" width="64" height="64">
      </div>
      <h2>Reset Password</h2>
      <p>Set a new secure password for your account</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="recovery-form">
      <!-- New Password -->
      <div class="form-group">
        <label for="newPassword">New Password:</label>
        <div class="password-input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" id="newPassword" formControlName="newPassword" class="glass-input"
            [class.is-invalid]="submitted && f['newPassword'].errors" placeholder="Enter new password">
          <button type="button" class="password-toggle-btn" (click)="togglePassword()">
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </button>
        </div>
        <div *ngIf="submitted && f['newPassword'].errors" class="invalid-feedback">
          <div *ngIf="f['newPassword'].errors['required']">Password is required</div>
          <div *ngIf="f['newPassword'].errors['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password:</label>
        <input [type]="showPassword ? 'text' : 'password'" id="confirmPassword" formControlName="confirmPassword" class="glass-input"
          [class.is-invalid]="submitted && (f['confirmPassword'].errors || resetForm.errors?.['mismatch'])" placeholder="Confirm new password">
        <div *ngIf="submitted && (f['confirmPassword'].errors || resetForm.errors?.['mismatch'])" class="invalid-feedback">
          <div *ngIf="f['confirmPassword']?.errors?.['required']">Confirmation is required</div>
          <div *ngIf="resetForm.errors?.['mismatch']">Passwords do not match</div>
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
      <div *ngIf="success" class="alert alert-success">
        Password successfully updated! Redirecting to your dashboard...
      </div>

      <div class="form-group">
        <button type="submit" class="glass-btn w-full" [disabled]="loading || success">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
      </div>
    </form>
  </div>
</div>
