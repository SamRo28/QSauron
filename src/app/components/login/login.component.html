<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-container">
        <img src="/logo.svg" alt="QSauron Logo" width="64" height="64">
      </div>
      <h2>Login</h2>
      <p>Access your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email field -->
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" formControlName="email" class="form-control"
          [class.is-invalid]="submitted && f['email'].errors" placeholder="Enter your email">
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Email must have a valid format</div>
        </div>
      </div>

      <!-- Password field -->
      <div class="form-group">
        <label for="password">Password:</label>
        <div class="password-input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="pwd" class="form-control"
            [class.is-invalid]="submitted && f['pwd'].errors" placeholder="Enter your password">
          <button type="button" class="password-toggle-btn" (click)="togglePassword()">
            <!-- Eye Icon -->
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <!-- Eye Off Icon -->
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
              </path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
        <div *ngIf="submitted && f['pwd'].errors" class="invalid-feedback">
          <div *ngIf="f['pwd'].errors['required']">Password is required</div>
          <div *ngIf="f['pwd'].errors['minlength']">Password must be at least 6 characters long</div>
        </div>
      </div>

      <!-- Error message -->
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <!-- Submit button -->
      <div class="form-group">
        <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? 'Logging in...' : 'Login' }}
        </button>
      </div>

      <!-- Register link -->
      <div class="form-group text-center">
        <p>Don't have an account?
          <a href="#" (click)="navigateToRegister(); $event.preventDefault()" class="register-link">
            Register here
          </a>
        </p>
      </div>
    </form>
  </div>
</div>
