<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Iniciar Sesión</h2>
      <p>Accede a tu cuenta</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email field -->
      <div class="form-group">
        <label for="email">Email:</label>
        <input 
          type="email" 
          id="email"
          formControlName="email" 
          class="form-control"
          [class.is-invalid]="submitted && f['email'].errors"
          placeholder="Ingresa tu email">
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">El email es requerido</div>
          <div *ngIf="f['email'].errors['email']">El email debe tener un formato válido</div>
        </div>
      </div>

      <!-- Password field -->
      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input 
          type="password" 
          id="password"
          formControlName="pwd" 
          class="form-control"
          [class.is-invalid]="submitted && f['pwd'].errors"
          placeholder="Ingresa tu contraseña">
        <div *ngIf="submitted && f['pwd'].errors" class="invalid-feedback">
          <div *ngIf="f['pwd'].errors['required']">La contraseña es requerida</div>
          <div *ngIf="f['pwd'].errors['minlength']">La contraseña debe tener al menos 6 caracteres</div>
        </div>
      </div>

      <!-- Error message -->
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <!-- Submit button -->
      <div class="form-group">
        <button 
          type="submit" 
          class="btn btn-primary btn-block"
          [disabled]="loading">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
        </button>
      </div>

      <!-- Register link -->
      <div class="form-group text-center">
        <p>¿No tienes cuenta? 
          <a href="#" (click)="navigateToRegister(); $event.preventDefault()" class="register-link">
            Regístrate aquí
          </a>
        </p>
      </div>
    </form>
  </div>
</div>
